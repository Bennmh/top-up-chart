<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADHD Medication & Sleep Visualizer</title>
    <!-- Chart.js CDN for clean, reactive graphing -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-color: #2d3748;
            --border-color: #d1d5db; 
            
            /* Enhanced high-vibrancy color mapping */
            --elvanse-theme: #3b82f6;      /* Illuminated, bright vivid blue */
            --elvanse-ref: #60a5fa;        /* Light sky blue variant for reference */
            --amfexa-morning: #ff7a00;     /* Lighter, punched-up vibrant orange */
            --amfexa-booster: #d946ef;     /* Lighter, radiant electric pinky-purple / fuchsia */
            --total-theme: #7c3aed;        /* Solid rich violet core */
            --sleep-theme: #f43f5e;        /* Clean saturated rose pink-red */
            --ref-theme: #64748b;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 16px;
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
        }

        header {
            text-align: left;
            margin-bottom: 20px;
            border-bottom: 1px solid #e2e8f0;
            padding-bottom: 12px;
        }

        h1 { margin: 0 0 4px 0; color: #1a202c; font-size: 1.65rem; font-weight: 700; }
        p.subtitle { margin: 0; color: #718096; font-size: 0.9rem; }

        .dashboard {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            align-items: start;
        }

        @media (min-width: 950px) {
            .dashboard { grid-template-columns: 390px 1fr; }
        }

        .controls-column {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .input-box {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 12px;
        }

        .box-base { background: #ffffff; }
        
        /* Linked View Options Container block with flat internal corners */
        .view-options-group {
            margin-top: 8px;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            background: #f1f5f9;
            padding: 3px;
            display: flex;
            flex-direction: column;
            gap: 0px; /* Seamless joining */
        }

        .view-options-group .input-box {
            border: none;
            background: var(--card-bg);
        }

        /* Squared joining boundaries for inner modules */
        .view-options-group .input-box:first-child {
            border-radius: 9px 9px 0 0;
            border-bottom: 1px solid #e2e8f0;
        }

        .view-options-group .input-box:last-child {
            border-radius: 0 0 9px 9px;
        }

        .box-title {
            font-size: 0.92rem;
            font-weight: 700;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #1a202c;
        }

        .title-left-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .title-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
        }

        .segmented-control {
            display: flex;
            background: #cbd5e1;
            padding: 2px;
            border-radius: 6px;
            margin-bottom: 10px;
        }

        .segmented-control label {
            flex: 1;
            text-align: center;
            font-size: 0.8rem;
            font-weight: 500;
            color: #334155;
            padding: 5px 0;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.1s ease;
        }

        .segmented-control input { display: none; }
        
        .segmented-control input:checked + label {
            background: var(--card-bg);
            box-shadow: 0 1px 2px rgba(0,0,0,0.12);
            color: #0f172a;
            font-weight: 600;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
            margin-bottom: 8px;
        }

        .input-group:last-child { margin-bottom: 0; }

        label.field-label { font-size: 0.84rem; font-weight: 400; color: #4b5563; }
        
        input[type="range"] {
            width: 100%;
            cursor: pointer;
            margin: 4px 0;
        }

        #boosterDose, #boosterDelay { accent-color: var(--amfexa-booster); }
        #sleepThresholdSlider { accent-color: var(--sleep-theme); }
        #refDose { accent-color: var(--elvanse-ref); }

        .time-stepper-container {
            display: flex;
            gap: 6px;
            align-items: center;
        }

        input[type="time"] {
            padding: 6px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 0.9rem;
            background: var(--card-bg);
            box-sizing: border-box;
            flex: 1;
        }

        .step-btn {
            background: #f1f5f9;
            border: 1px solid #cbd5e1;
            color: #334155;
            border-radius: 6px;
            width: 32px;
            height: 32px;
            font-size: 1.1rem;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
        }

        .step-btn:hover { background: #e2e8f0; }

        .value-display {
            font-weight: 500;
            font-size: 0.88rem;
            color: #4b5563;
        }

        .flex-header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .checkbox-row {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            font-size: 0.84rem;
            font-weight: 400;
            color: #4b5563;
        }

        .checkbox-row input { width: 14px; height: 14px; margin: 0; }

        .visualizer-card {
            background: var(--card-bg);
            padding: 16px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            height: 100%;
            min-height: 580px;
            box-sizing: border-box;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>ADHD Medication & Sleep Visualizer</h1>
        <p class="subtitle">Track medication levels and estimated sleep clearance across a 30-hour timeline</p>
    </header>

    <div class="dashboard">
        <div class="controls-column">
            
            <!-- Timing Parameters Base -->
            <div class="input-box box-base">
                <div class="input-group">
                    <label class="field-label">Wake up time / baseline start</label>
                    <div class="time-stepper-container">
                        <input type="time" id="startTime" value="10:30">
                        <button class="step-btn" id="stepDown" title="Minus 15 minutes">−</button>
                        <button class="step-btn" id="stepUp" title="Plus 15 minutes">+</button>
                    </div>
                </div>
            </div>

            <!-- Consolidated Slot 1: Morning Profile -->
            <div class="input-box" id="morningCard">
                <div class="box-title">
                    <div class="title-left-group">
                        <span class="title-dot" id="morningDot"></span>
                        <span>Slot 1: Morning dose</span>
                    </div>
                </div>
                
                <div class="segmented-control">
                    <input type="radio" id="typeElvanse" name="morningType" value="elvanse" checked>
                    <label for="typeElvanse">Elvanse (LDX)</label>
                    <input type="radio" id="typeAmfexa" name="morningType" value="amfexa">
                    <label for="typeAmfexa">Amfexa (DEX)</label>
                </div>

                <div class="input-group">
                    <div class="flex-header-row">
                        <label class="field-label">Dosage</label>
                        <span id="morningDoseVal" class="value-display">45 mg</span>
                    </div>
                    <input type="range" id="morningDose" min="20" max="100" step="5" value="45">
                </div>
            </div>

            <!-- Slot 2: Afternoon Booster Track -->
            <div class="input-box" style="background: rgba(217, 70, 239, 0.01);">
                <div class="box-title">
                    <div class="title-left-group">
                        <span class="title-dot" style="background-color: var(--amfexa-booster);"></span>
                        <span>Slot 2: Afternoon booster</span>
                    </div>
                    <label class="checkbox-row">
                        <input type="checkbox" id="useBooster" checked> Active
                    </label>
                </div>
                
                <div id="boosterControls">
                    <div class="input-group">
                        <div class="flex-header-row">
                            <label class="field-label">Booster dosage</label>
                            <span id="boosterDoseVal" class="value-display">5.0 mg</span>
                        </div>
                        <input type="range" id="boosterDose" min="1.25" max="20" step="1.25" value="5">
                    </div>

                    <div class="input-group">
                        <div class="flex-header-row">
                            <label class="field-label">Time after morning dose</label>
                            <span id="boosterDelayVal" class="value-display">5.0h later</span>
                        </div>
                        <input type="range" id="boosterDelay" min="1" max="16" step="0.5" value="5">
                    </div>
                </div>
            </div>

            <!-- Integrated View Settings Module Layout -->
            <div class="view-options-group">
                <!-- Sleep Threshold Layer Panel -->
                <div class="input-box">
                    <div class="box-title">
                        <div class="title-left-group">
                            <span class="title-dot" style="background-color: var(--sleep-theme);"></span>
                            <span>Sleep window option</span>
                        </div>
                    </div>
                    <div class="input-group">
                        <div class="flex-header-row">
                            <label class="field-label">Required drop in levels for sleep</label>
                            <span id="sleepThresholdVal" class="value-display">75% drop</span>
                        </div>
                        <input type="range" id="sleepThresholdSlider" min="40" max="95" step="5" value="75">
                    </div>
                </div>

                <!-- Reference Platform Panel -->
                <div class="input-box">
                    <div class="box-title">
                        <div class="title-left-group">
                            <span class="title-dot" style="background-color: var(--elvanse-ref);"></span>
                            <span>Comparison track (Elvanse)</span>
                        </div>
                        <label class="checkbox-row">
                            <input type="checkbox" id="useRef"> Show
                        </label>
                    </div>
                    
                    <div id="refControls" style="display: none;">
                        <div class="input-group">
                            <div class="flex-header-row">
                                <label class="field-label">Compare with a single morning dose</label>
                                <span id="refDoseVal" class="value-display">60 mg</span>
                            </div>
                            <input type="range" id="refDose" min="20" max="100" step="5" value="60">
                        </div>
                    </div>
                </div>
            </div>

        </div>

        <!-- Graph Field Panel -->
        <div class="visualizer-card">
            <div style="position: relative; width:100%; height:100%; min-height: 540px;">
                <canvas id="chartCanvas"></canvas>
            </div>
        </div>
    </div>
</div>

<script>
    const pkin = {
        elvanse: { ka: 0.65, ke: 0.063, bio: 0.297 }, 
        amfexa:  { ka: 2.50, ke: 0.068, bio: 0.730 }  
    };

    // UI elements binding
    const startTimeInput = document.getElementById('startTime');
    const stepDownBtn = document.getElementById('stepDown');
    const stepUpBtn = document.getElementById('stepUp');
    const morningDoseSlider = document.getElementById('morningDose');
    const morningDoseVal = document.getElementById('morningDoseVal');
    const morningCard = document.getElementById('morningCard');
    const morningDot = document.getElementById('morningDot');
    const useBoosterCheck = document.getElementById('useBooster');
    const boosterControls = document.getElementById('boosterControls');
    const boosterDoseSlider = document.getElementById('boosterDose');
    const boosterDoseVal = document.getElementById('boosterDoseVal');
    const boosterDelaySlider = document.getElementById('boosterDelay');
    const boosterDelayVal = document.getElementById('boosterDelayVal');
    const useRefCheck = document.getElementById('useRef');
    const refControls = document.getElementById('refControls');
    const refSlider = document.getElementById('refDose');
    const refDoseVal = document.getElementById('refDoseVal');
    const sleepThresholdSlider = document.getElementById('sleepThresholdSlider');
    const sleepThresholdVal = document.getElementById('sleepThresholdVal');
    const ctx = document.getElementById('chartCanvas').getContext('2d');

    let simulationChart = null;
    let tickDataStore = [];

    const CACHE_KEY = 'adhd_visualizer_v3_cache';

    function saveState() {
        const state = {
            startTime: startTimeInput.value,
            morningType: document.querySelector('input[name="morningType"]:checked').value,
            morningDose: morningDoseSlider.value,
            useBooster: useBoosterCheck.checked,
            boosterDose: boosterDoseSlider.value,
            boosterDelay: boosterDelaySlider.value,
            useRef: useRefCheck.checked,
            refDose: refSlider.value,
            sleepThreshold: sleepThresholdSlider.value
        };
        localStorage.setItem(CACHE_KEY, JSON.stringify(state));
    }

    function loadState() {
        const cached = localStorage.getItem(CACHE_KEY);
        if (!cached) return;
        try {
            const state = JSON.parse(cached);
            startTimeInput.value = state.startTime || "10:30";
            
            const radioToCheck = document.querySelector(`input[name="morningType"][value="${state.morningType}"]`);
            if (radioToCheck) radioToCheck.checked = true;
            
            adjustMorningSliderLimits(state.morningType, false);
            
            morningDoseSlider.value = state.morningDose;
            useBoosterCheck.checked = state.useBooster;
            boosterDoseSlider.value = state.boosterDose;
            boosterDelaySlider.value = state.boosterDelay;
            useRefCheck.checked = state.useRef;
            refSlider.value = state.refDose;
            sleepThresholdSlider.value = state.sleepThreshold;
        } catch (e) {
            console.error("Local context loading bypassed", e);
        }
    }

    // Dynamic state management for active card parameters
    function adjustMorningSliderLimits(type, resetValue = true) {
        if (type === 'elvanse') {
            morningDoseSlider.min = "20"; morningDoseSlider.max = "100"; morningDoseSlider.step = "5";
            if (resetValue) morningDoseSlider.value = "45";
            morningDot.style.backgroundColor = "var(--elvanse-theme)";
            morningDoseSlider.style.accentColor = "var(--elvanse-theme)";
            morningCard.style.backgroundColor = "rgba(59, 130, 246, 0.02)";
        } else {
            morningDoseSlider.min = "1.25"; morningDoseSlider.max = "20"; morningDoseSlider.step = "1.25";
            if (resetValue) morningDoseSlider.value = "5";
            morningDot.style.backgroundColor = "var(--amfexa-morning)";
            morningDoseSlider.style.accentColor = "var(--amfexa-morning)";
            morningCard.style.backgroundColor = "rgba(255, 122, 0, 0.02)";
        }
    }

    function handleTimeStep(changeMinutes) {
        let [h, m] = startTimeInput.value.split(':').map(Number);
        let totalMinutes = h * 60 + m + changeMinutes;
        
        if (totalMinutes < 0) totalMinutes += 1440;
        if (totalMinutes >= 1440) totalMinutes %= 1440;
        
        const newH = Math.floor(totalMinutes / 60).toString().padStart(2, '0');
        const newM = (totalMinutes % 60).toString().padStart(2, '0');
        startTimeInput.value = `${newH}:${newM}`;
        
        renderSimulation();
        saveState();
    }

    function formatTimeLabel(startStr, elapsedHours) {
        const [startH, startM] = startStr.split(':').map(Number);
        const totalMinutesAbsolute = (startH * 60) + startM + Math.round(elapsedHours * 60);

        const absoluteHours = Math.floor(totalMinutesAbsolute / 60);
        const displayMinutes = Math.floor(totalMinutesAbsolute % 60).toString().padStart(2, '0');
        
        const dayCounter = Math.floor(absoluteHours / 24);
        const hour12 = ((absoluteHours % 24) % 12 || 12);
        const period = (absoluteHours % 24) >= 12 ? 'pm' : 'am';
        const dayMarker = dayCounter > 0 ? '*' : '';

        return {
            clock: `${hour12}:${displayMinutes}${period}${dayMarker}`,
            elapsed: `+${elapsedHours}h`,
            totalMinutesAbsolute: totalMinutesAbsolute
        };
    }

    function calculateConcentration(payload, ka, ke, t) {
        if (t <= 0) return 0;
        return payload * (ka / (ka - ke)) * (Math.exp(-ke * t) - Math.exp(-ka * t));
    }

    // Precise timeline overlays avoiding boundary cutting
    const timelineEnhancementsPlugin = {
        id: 'timelineEnhancements',
        afterDraw: (chart) => {
            const xAxis = chart.scales.x;
            const chartArea = chart.chartArea;
            if (!xAxis || !chartArea) return;
            const ctx = chart.ctx;

            const baseTimeStr = startTimeInput.value || "10:30";
            const [sh, sm] = baseTimeStr.split(':').map(Number);
            
            // Clean midnight grid boundary line
            for (let hour = 0; hour <= 30; hour += 0.5) {
                const absoluteMins = (sh * 60) + sm + Math.round(hour * 60);
                if (absoluteMins % 1440 === 0 && hour > 0) {
                    const xLine = xAxis.getPixelForValue(hour * 2);
                    ctx.save();
                    ctx.beginPath();
                    ctx.moveTo(xLine, chartArea.top);
                    ctx.lineTo(xLine, chartArea.bottom);
                    ctx.strokeStyle = '#475569';
                    ctx.lineWidth = 1.1; 
                    ctx.stroke();

                    ctx.fillStyle = '#475569';
                    ctx.font = '700 10px -apple-system, BlinkMacSystemFont, sans-serif';
                    ctx.textAlign = 'left';
                    ctx.fillText(' Midnight', xLine + 5, chartArea.top + 14);
                    ctx.restore();
                }
            }

            // Realtime position indicator line
            const now = new Date();
            const elapsedMins = (now.getHours() * 60 + now.getMinutes()) - (sh * 60 + sm);
            let absoluteElapsed = elapsedMins >= 0 ? elapsedMins / 60 : (elapsedMins + 1440) / 60;

            if (absoluteElapsed >= 0 && absoluteElapsed <= 30) {
                const xPixel = xAxis.getPixelForValue(absoluteElapsed * 2); 
                ctx.save();
                ctx.beginPath();
                ctx.moveTo(xPixel, chartArea.top);
                ctx.lineTo(xPixel, chartArea.bottom);
                ctx.strokeStyle = '#0d9488';
                ctx.lineWidth = 1.2;
                ctx.setLineDash([3, 3]);
                ctx.stroke();

                let liveHours = now.getHours();
                const liveMins = now.getMinutes().toString().padStart(2, '0');
                const liveAmPm = liveHours >= 12 ? 'pm' : 'am';
                liveHours = liveHours % 12 || 12;
                const formattedNowString = `${liveHours}:${liveMins}${liveAmPm} (now)`;

                ctx.fillStyle = '#0d9488';
                ctx.font = '500 11px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText(formattedNowString, xPixel, chartArea.top - 6);
                ctx.restore();
            }
        }
    };

    function renderSimulation() {
        const baseStartTime = startTimeInput.value || "10:30";
        const morningType = document.querySelector('input[name="morningType"]:checked').value;
        const morningDose = parseFloat(morningDoseSlider.value);
        const addBooster = useBoosterCheck.checked;
        const boosterDose = parseFloat(boosterDoseSlider.value);
        const boosterDelay = parseFloat(boosterDelaySlider.value);
        const addRef = useRefCheck.checked;
        const refDose = parseFloat(refSlider.value);
        const dropPercent = parseFloat(sleepThresholdSlider.value);

        // Control synchronizations
        morningDoseVal.textContent = `${morningDose} mg`;
        boosterDoseVal.textContent = `${boosterDose.toFixed(2)} mg`;
        boosterDelayVal.textContent = `${boosterDelay.toFixed(1)}h later`;
        refDoseVal.textContent = `${refDose} mg`;
        sleepThresholdVal.textContent = `${dropPercent}% drop`;

        boosterControls.style.opacity = addBooster ? '1' : '0.3';
        refControls.style.display = addRef ? 'block' : 'none';

        const rawLabels = [];
        tickDataStore = [];
        const morningData = [];
        const boosterData = [];
        const totalData = [];
        const referenceData = [];

        const mParams = pkin[morningType];
        const bParams = pkin['amfexa'];

        let metricPeak = 0;
        for (let hour = 0; hour <= 30; hour += 0.5) {
            let mVal = calculateConcentration(morningDose * mParams.bio, mParams.ka, mParams.ke, hour);
            let bVal = addBooster ? calculateConcentration(boosterDose * bParams.bio, bParams.ka, bParams.ke, hour - boosterDelay) : 0;
            if ((mVal + bVal) > metricPeak) metricPeak = (mVal + bVal);
        }
        if (metricPeak === 0) metricPeak = 1;

        const dynamicThresholdValue = metricPeak * (1 - (dropPercent / 100));
        const sleepLineData = [];

        for (let hour = 0; hour <= 30; hour += 0.5) {
            const timeObj = formatTimeLabel(baseStartTime, hour);
            rawLabels.push(timeObj.clock);
            tickDataStore.push(timeObj);

            const cMorning = calculateConcentration(morningDose * mParams.bio, mParams.ka, mParams.ke, hour);
            const cBooster = addBooster ? calculateConcentration(boosterDose * bParams.bio, bParams.ka, bParams.ke, hour - boosterDelay) : 0;
            const cRef = addRef ? calculateConcentration(refDose * pkin.elvanse.bio, pkin.elvanse.ka, pkin.elvanse.ke, hour) : 0;

            morningData.push(cMorning);
            boosterData.push(cBooster);
            totalData.push(cMorning + cBooster);
            referenceData.push(cRef);
            sleepLineData.push(dynamicThresholdValue);
        }

        // Resolves line rendering issues by cleanly mapping parameters directly inside active instances
        if (simulationChart) {
            simulationChart.data.labels = rawLabels;
            simulationChart.data.datasets[0].data = totalData;
            simulationChart.data.datasets[1].data = sleepLineData;
            simulationChart.data.datasets[2].data = morningData;
            simulationChart.data.datasets[2].borderColor = morningType === 'elvanse' ? 'var(--elvanse-theme)' : 'var(--amfexa-morning)';
            simulationChart.data.datasets[2].label = morningType === 'elvanse' ? 'Morning Base (Elvanse)' : 'Morning Base (Amfexa)';
            simulationChart.data.datasets[3].data = boosterData;
            simulationChart.data.datasets[3].hidden = !addBooster;
            simulationChart.data.datasets[4].data = referenceData;
            simulationChart.data.datasets[4].hidden = !addRef;
            simulationChart.data.datasets[4].label = `Comparison Track (${refDose}mg Elvanse)`;
            
            simulationChart.update('none'); 
            return;
        }

        simulationChart = new Chart(ctx, {
            type: 'line',
            plugins: [timelineEnhancementsPlugin],
            data: {
                labels: rawLabels,
                datasets: [
                    {
                        label: 'Active System Profile',
                        data: totalData,
                        borderColor: 'var(--total-theme)',
                        backgroundColor: 'rgba(124, 92, 237, 0.05)', /* Re-established highly visible area tint fill */
                        fill: true,
                        borderWidth: 2.5,
                        pointRadius: 0,
                        tension: 0.12
                    },
                    {
                        label: 'Sleep Clearance Indicator',
                        data: sleepLineData,
                        borderColor: 'var(--sleep-theme)',
                        borderWidth: 1.2,
                        borderDash: [6, 4], 
                        fill: false,
                        pointRadius: 0
                    },
                    {
                        label: morningType === 'elvanse' ? 'Morning Base (Elvanse)' : 'Morning Base (Amfexa)',
                        data: morningData,
                        borderColor: morningType === 'elvanse' ? 'var(--elvanse-theme)' : 'var(--amfexa-morning)',
                        borderDash: [4, 4],
                        borderWidth: 1.2,
                        fill: false,
                        pointRadius: 0
                    },
                    {
                        label: 'Slot 2 Booster',
                        data: boosterData,
                        borderColor: 'var(--amfexa-booster)',
                        borderDash: [4, 4],
                        borderWidth: 1.2,
                        fill: false,
                        pointRadius: 0,
                        hidden: !addBooster
                    },
                    {
                        label: `Comparison Track (${refDose}mg Elvanse)`,
                        data: referenceData,
                        borderColor: 'var(--elvanse-ref)',
                        borderDash: [15, 8], /* Relaxed layout using fewer dashes across the timeline */
                        borderWidth: 1.5,
                        fill: false,
                        pointRadius: 0,
                        hidden: !addRef
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                animation: false, 
                interaction: { mode: 'index', intersect: false },
                scales: {
                    x: {
                        grid: {
                            display: true,
                            color: function(context) {
                                // Renders crisp layout lines every single hour (even indices) with optimized opacity
                                if (context.index % 2 === 0) return 'rgba(0, 0, 0, 0.16)'; 
                                return 'transparent'; 
                            },
                            lineWidth: 1
                        },
                        ticks: {
                            maxRotation: 0,
                            autoSkip: false,
                            callback: function(val, index) {
                                // Keeps label output anchored explicitly to 2-hour increments
                                if (index % 4 === 0) {
                                    const tObj = tickDataStore[index];
                                    return tObj.clock;
                                }
                                return null;
                            },
                            font: function(context) {
                                const idx = context.index;
                                // Forces bold weight profile for original baseline point and midnight steps
                                if (idx === 0) return { weight: '700', size: 10 };
                                if (tickDataStore[idx]) {
                                    if (tickDataStore[idx].clock.startsWith('12:00am')) {
                                        return { weight: '700', size: 10 };
                                    }
                                }
                                return { size: 9 };
                            }
                        }
                    },
                    y: {
                        beginAtZero: true,
                        grid: { color: 'rgba(0,0,0,0.03)' },
                        title: { display: true, text: 'Active Concentration (mg base equivalents)', font: { size: 11, weight: '600' } }
                    }
                },
                plugins: {
                    tooltip: {
                        padding: 10,
                        caretPadding: 16, /* Comfortable spacing offset from pointer line elements */
                        callbacks: {
                            title: function(context) {
                                const idx = context[0].dataIndex;
                                return `Time window: ${rawLabels[idx].replace('*', ' (next day)')} (+${idx * 0.5}h tracking)`;
                            }
                        }
                    }
                }
            }
        });
    }

    // Input Trigger Registry
    const triggerElements = [
        startTimeInput, morningDoseSlider, useBoosterCheck, 
        boosterDoseSlider, boosterDelaySlider, useRefCheck, refSlider, sleepThresholdSlider
    ];

    triggerElements.forEach(element => {
        element.addEventListener('input', () => {
            renderSimulation();
            saveState();
        });
    });

    document.querySelectorAll('input[name="morningType"]').forEach(radio => {
        radio.addEventListener('change', (e) => {
            adjustMorningSliderLimits(e.target.value, true);
            renderSimulation();
            saveState();
        });
    });

    stepDownBtn.addEventListener('click', () => handleTimeStep(-15));
    stepUpBtn.addEventListener('click', () => handleTimeStep(15));

    // Run Initialization Sequence
    loadState();
    renderSimulation();

    setInterval(() => {
        if (simulationChart) { simulationChart.draw(); }
    }, 60000);
</script>

</body>
</html>
