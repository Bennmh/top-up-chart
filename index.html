<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Split Dose</title>
    
    <!-- PWA iOS Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Split Dose">
    
    <!-- iOS Home Screen Icon (Built-in Emoji) -->
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2222%22 fill=%22%233b82f6%22/><text y=%22.72em%22 x=%220.1em%22 font-size=%2270%22>💧</text></svg>">
    
    <!-- Desktop Browser Tab Icon (Built-in Emoji) -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💧</text></svg>">
    
    <!-- Embedded Manifest via Data URI -->
    <link rel="manifest" href="data:application/json,{%22name%22:%22Split%20Dose%22,%22short_name%22:%22Split%20Dose%22,%22start_url%22:%22.%22,%22display%22:%22standalone%22,%22background_color%22:%22%23f3f4f6%22,%22theme_color%22:%22%234f46e5%22}">
    
    <style>
        :root {
            --bg: #f9fafb;
            --card-bg: #ffffff;
            --text: #1f2937;
            --primary: #3b82f6;
            --primary-light: #dbeafe;
            --secondary: #e5e7eb;
            --accent: #f43f5e;
            --accent-light: #ffe4e6;
            --radius: 16px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            padding: 20px;
            padding-top: calc(20px + env(safe-area-inset-top));
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }

        .app-container {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        header {
            text-align: center;
            margin-bottom: 5px;
        }

        header h1 {
            font-size: 28px;
            font-weight: 800;
            color: var(--primary);
            letter-spacing: -0.5px;
        }

        /* Mode Selector Tabs */
        .mode-selector {
            display: flex;
            background: var(--secondary);
            border: 3px solid var(--text);
            border-radius: var(--radius);
            padding: 4px;
            gap: 4px;
            box-shadow: 4px 4px 0px var(--text);
        }

        .tab-btn {
            flex: 1;
            border: none;
            background: transparent;
            padding: 10px 4px;
            font-size: 13px;
            font-weight: 700;
            color: #4b5563;
            cursor: pointer;
            border-radius: calc(var(--radius) - 12px);
            transition: all 0.2s ease;
            text-align: center;
        }

        .tab-btn.active {
            background: var(--text);
            color: white;
        }

        .card {
            background: var(--card-bg);
            border: 3px solid var(--text);
            border-radius: var(--radius);
            padding: 20px;
            box-shadow: 4px 4px 0px var(--text);
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .label-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 700;
            font-size: 16px;
        }

        .value-badge {
            background: var(--text);
            color: white;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 14px;
        }

        .stepper-container {
            display: flex;
            align-items: center;
            gap: 12px;
            width: 100%;
        }

        .btn-step {
            width: 44px;
            height: 44px;
            border: 2px solid var(--text);
            background: var(--card-bg);
            border-radius: 50%;
            font-size: 20px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 2px 2px 0px var(--text);
        }

        .btn-step:active {
            transform: translate(1px, 1px);
            box-shadow: 1px 1px 0px var(--text);
        }

        input[type="range"] {
            flex-grow: 1;
            -webkit-appearance: none;
            appearance: none;
            height: 10px;
            border-radius: 5px;
            background: var(--secondary);
            outline: none;
            border: 2px solid var(--text);
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: var(--primary);
            border: 2px solid var(--text);
            cursor: pointer;
        }

        /* Visualizer Box */
        .visualizer {
            height: 120px;
            border: 3px solid var(--text);
            border-radius: var(--radius);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            background: var(--secondary);
            box-shadow: 4px 4px 0px var(--text);
        }

        .block-leave {
            background: var(--accent-light);
            color: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 13px;
            transition: height 0.2s ease;
            text-align: center;
            border-bottom: 2px dashed var(--text);
            overflow: hidden;
        }

        .block-drink {
            background: var(--primary-light);
            color: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 16px;
            flex-grow: 1;
            transition: height 0.2s ease;
            text-align: center;
            overflow: hidden;
        }

        /* Result Banner */
        .result-card {
            background: #caffbf;
            border: 3px solid var(--text);
            border-radius: var(--radius);
            padding: 18px;
            text-align: center;
            box-shadow: 4px 4px 0px var(--text);
        }

        .result-instruction {
            font-size: 13px;
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 1px;
            color: #4b5563;
            margin-bottom: 4px;
        }

        .result-main {
            font-size: 30px;
            font-weight: 900;
            color: var(--text);
        }

        .timing-note {
            font-size: 12px;
            color: #6b7280;
            text-align: center;
            font-style: italic;
            margin-top: -4px;
        }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <h1>Split Dose</h1>
    </header>

    <!-- Top Tab Navigation -->
    <div class="mode-selector">
        <button id="tab-elvanse" class="tab-btn active" onclick="switchMode('elvanse')">Elvanse</button>
        <button id="tab-amfexa1" class="tab-btn" onclick="switchMode('amfexa1')">Amfexa 1</button>
        <button id="tab-amfexa2" class="tab-btn" onclick="switchMode('amfexa2')">Amfexa 2</button>
    </div>

    <!-- Visual Representation -->
    <div class="visualizer">
        <div id="blockLeave" class="block-leave">Leave 0ml</div>
        <div id="blockDrink" class="block-drink">Drink 0ml</div>
    </div>

    <!-- Final Quick Answer -->
    <div class="result-card">
        <div id="resultLabel" class="result-instruction">Your Target</div>
        <div id="finalOutput" class="result-main">Drink -- ml</div>
    </div>
    
    <div id="timingNote" class="timing-note"></div>

    <!-- Pill Capacity -->
    <div class="card control-group">
        <div class="label-row">
            <span>Pill Size</span>
            <span id="pillVal" class="value-badge">70 mg</span>
        </div>
        <div class="stepper-container">
            <button class="btn-step" onclick="adjust('pill', -5)">-</button>
            <input type="range" id="pillInput" min="5" max="100" step="5" value="70">
            <button class="btn-step" onclick="adjust('pill', 5)">+</button>
        </div>
    </div>

    <!-- Water Amount -->
    <div class="card control-group">
        <div class="label-row">
            <span>Total Water</span>
            <span id="waterVal" class="value-badge">30 ml</span>
        </div>
        <div class="stepper-container">
            <button class="btn-step" onclick="adjust('water', -5)">-</button>
            <input type="range" id="waterInput" min="5" max="100" step="5" value="30">
            <button class="btn-step" onclick="adjust('water', 5)">+</button>
        </div>
    </div>

    <!-- Target Dose -->
    <div class="card control-group">
        <div class="label-row">
            <span>Target Dose</span>
            <span id="targetVal" class="value-badge">45 mg</span>
        </div>
        <div class="stepper-container">
            <button class="btn-step" onclick="adjust('target', -5)">-</button>
            <input type="range" id="targetInput" min="2.5" max="100" step="2.5" value="45">
            <button class="btn-step" onclick="adjust('target', 5)">+</button>
        </div>
    </div>
</div>

<script>
    // App State: Holds calculation values independently for each profile
    let currentMode = 'elvanse';
    const state = {
        elvanse: { pill: 70, water: 30, target: 45 },
        amfexa1: { pill: 20, water: 20, target: 10 },
        amfexa2: { pill: 10, water: 20, target: 5 }
    };

    const pillInput = document.getElementById('pillInput');
    const waterInput = document.getElementById('waterInput');
    const targetInput = document.getElementById('targetInput');

    const pillVal = document.getElementById('pillVal');
    const waterVal = document.getElementById('waterVal');
    const targetVal = document.getElementById('targetVal');

    const blockLeave = document.getElementById('blockLeave');
    const blockDrink = document.getElementById('blockDrink');
    const finalOutput = document.getElementById('finalOutput');
    const resultLabel = document.getElementById('resultLabel');
    const timingNote = document.getElementById('timingNote');

    function switchMode(newMode) {
        // Remove active class from old tab, add to new tab
        document.getElementById(`tab-${currentMode}`).classList.remove('active');
        document.getElementById(`tab-${newMode}`).classList.add('active');

        // Save current UI inputs into the current mode's data state
        state[currentMode].pill = parseInt(pillInput.value);
        state[currentMode].water = parseInt(waterInput.value);
        state[currentMode].target = parseFloat(targetInput.value);

        // Update mode pointer
        currentMode = newMode;

        // Load targeted mode data into the UI elements
        pillInput.value = state[currentMode].pill;
        waterInput.value = state[currentMode].water;
        
        // Adjust slider granular steps based on medication type
        if (currentMode.startsWith('amfexa')) {
            targetInput.step = "2.5"; // Amfexa often requires micro-fraction increments
        } else {
            targetInput.step = "5";
        }

        targetInput.value = state[currentMode].target;

        // Refresh calculations
        calculate();
    }

    function adjust(type, amount) {
        const input = document.getElementById(`${type}Input`);
        input.value = parseFloat(input.value) + amount;
        calculate();
    }

    function calculate() {
        let pill = parseInt(pillInput.value);
        let water = parseInt(waterInput.value);
        let target = parseFloat(targetInput.value);

        // Boundary constraint check
        if (target > pill) {
            target = pill;
            targetInput.value = pill;
        }
        targetInput.max = pill;

        // Label layout updates based on context
        if (currentMode === 'elvanse') {
            resultLabel.innerText = "Morning Elvanse Target";
            timingNote.innerText = "Take once daily in the morning";
        } else if (currentMode === 'amfexa1') {
            resultLabel.innerText = "Amfexa Booster — Dose 1";
            timingNote.innerText = "Space doses 4 to 6 hours apart";
        } else {
            resultLabel.innerText = "Amfexa Booster — Dose 2";
            timingNote.innerText = "Avoid taking too late to safeguard sleep";
        }

        pillVal.innerText = `${pill} mg`;
        waterVal.innerText = `${water} ml (or grams)`;
        targetVal.innerText = `${target} mg`;

        // Mathematical conversion ratio logic
        const drinkAmount = (target / pill) * water;
        const leaveAmount = water - drinkAmount;

        const drinkFormatted = parseFloat(drinkAmount.toFixed(1));
        const leaveFormatted = parseFloat(leaveAmount.toFixed(1));

        finalOutput.innerText = `Drink ${drinkFormatted} ml`;

        // Style rendering mapping
        const leavePercent = (leaveAmount / water) * 100;
        if (leavePercent <= 0) {
            blockLeave.style.height = '0%';
            blockLeave.innerText = '';
        } else {
            blockLeave.style.height = `${leavePercent}%`;
            blockLeave.innerText = `Discard / Save: ${leaveFormatted} ml`;
        }

        blockDrink.innerText = `Drink: ${drinkFormatted} ml`;
    }

    // Connect standard action triggers
    [pillInput, waterInput, targetInput].forEach(input => {
        input.addEventListener('input', calculate);
    });

    // Run baseline initial pass
    calculate();
</script>

</body>
</html>
